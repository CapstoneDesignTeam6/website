services:
  - type: web
    name: capstone-be
    plan: free
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: DISCUSSION_AGENT_URL
        value: http://localhost:8001
      - key: EVALUATION_AGENT_URL
        value: http://localhost:8002
